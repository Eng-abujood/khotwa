<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور</title>
    <style>
        /* 1. إعدادات الصفحة الأساسية */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* خلفية متدرجة */
            padding: 20px;
        }

        /* 2. تأثير الزجاج (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px); /* هذا هو سر التأثير الزجاجي */
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h2 { margin-bottom: 20px; font-weight: 600; }
        p { margin-bottom: 30px; font-size: 0.95rem; opacity: 0.9; }

        /* 3. تنسيق الحقول والزر */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #ffffff;
            color: #764ba2;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #f0f0f0; transform: scale(1.02); }

        .back-link { margin-top: 20px; display: block; color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        
        #msg { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>استعادة الوصول</h2>
        <p>لا تقلق! أدخل بريدك وسنرسل لك رابطاً لإعادة تعيين كلمة مرورك.</p>
        
        <input type="email" id="emailField" placeholder="example@email.com">
        <button id="resetBtn">إرسال رابط التعيين</button>
        
        <div id="msg"></div>
        
        <a href="index.html" class="back-link">← العودة لتسجيل الدخول</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        // *** ضع بيانات الـ Firebase Config هنا ***
       const firebaseConfig = {
  apiKey: "AIzaSyCj3TexX9Akm3Sbau58vqe9xRboB10tx2A",
  authDomain: "khotwa-bcae2.firebaseapp.com",
  projectId: "khotwa-bcae2",
  storageBucket: "khotwa-bcae2.firebasestorage.app",
  messagingSenderId: "235032470480",
  appId: "1:235032470480:web:d65d79cbd2502147ba0fd5",
  measurementId: "G-G1Z0NZZ3F3"
};
        
        const auth = getAuth(initializeApp(firebaseConfig));
        const btn = document.getElementById('resetBtn');
        const msg = document.getElementById('msg');

        btn.addEventListener('click', () => {
            const email = document.getElementById('emailField').value;
            sendPasswordResetEmail(auth, email)
                .then(() => {
                    msg.innerText = "تم الإرسال! تفقد صندوق بريدك.";
                    msg.style.backgroundColor = "rgba(46, 204, 113, 0.3)";
                })
                .catch((err) => {
                    msg.innerText = "حدث خطأ: " + err.message;
                    msg.style.backgroundColor = "rgba(231, 76, 60, 0.3)";
                });
        });
    </script>
</body>
</html>
